# ====== 正式環境 profile：PostgreSQL（Zeabur 託管）======
# 為了相容多種注入方式，優先讀 SPRING_DATASOURCE_*；
# 若未設定，則退而組合 Zeabur PostgreSQL 服務常見的環境變數（POSTGRES_* / PG*）。
# 你在 Zeabur 後台最簡單的做法：把 DB 服務的變數引用設成 SPRING_DATASOURCE_URL /
#   SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD 即可。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:${PGHOST:localhost}}:${POSTGRES_PORT:${PGPORT:5432}}/${POSTGRES_DATABASE:${PGDATABASE:postgres}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USERNAME:${PGUSER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:${PGPASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# 明確指定 PostgreSQL 方言（避免連線異常時出現「Unable to determine Dialect」）
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.maximum-pool-size=10
# 啟動時若 DB 尚未就緒，稍作等待重試
spring.datasource.hikari.initialization-fail-timeout=60000
