# ====== 共用設定（繁體中文註解）======
spring.application.name=health-log

# 預設啟用 dev profile（本機 SQLite）；Zeabur 以環境變數 SPRING_PROFILES_ACTIVE=prod 覆寫
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 伺服器：讀取雲端平台注入的 PORT（Zeabur/Heroku 等），本機預設 8080，並綁定 0.0.0.0
server.port=${PORT:8080}
server.address=0.0.0.0

# JPA 共用
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# 可觀測性：決策樹計算過程可 log（§8）
logging.level.com.healthlog=INFO

# 檔案上傳/回應大小（PDF/Excel 匯出）
spring.servlet.multipart.max-file-size=10MB
