# ====== 雲端預設 profile：SQLite（零外部依賴，部署即可運行）======
# 此 profile 讓應用在 Zeabur 上「不需另外建立資料庫服務」即可啟動。
# 資料庫檔放在 /app/data（Dockerfile 會建立此目錄）。
#   - 若未掛載 Volume：資料為暫存，每次重新部署會重置（展示/作業足夠）。
#   - 若要永久保存：在 Zeabur 為此服務掛載 Volume 到 /app/data 即可。
spring.datasource.url=jdbc:sqlite:${SQLITE_PATH:/app/data/healthlog.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
# 明確指定方言，避免依賴連線後才探測（杜絕「Unable to determine Dialect」）
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.datasource.hikari.maximum-pool-size=1
